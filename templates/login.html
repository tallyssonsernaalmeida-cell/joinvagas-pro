{% extends "base.html" %}
{% block title %}Entrar{% endblock %}
{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo">⚡</div>
        <h1>JoinVagas PRO</h1>
        <p>Automação inteligente de candidaturas</p>
    </div>
    
    {% if erro %}
    <div class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        {{ erro }}
    </div>
    {% endif %}
    
    <form method="POST" action="/login" id="loginForm">
        <div class="form-group">
            <label>E-mail</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" name="email" placeholder="seu@email.com" required autofocus>
            </div>
        </div>
        
        <div class="form-group">
            <label>Senha</label>
            <div class="input-wrapper">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="senha" placeholder="Sua senha" required>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-sign-in-alt"></i> Entrar
        </button>
    </form>
    
    <div class="divider"><span>ou</span></div>
    
    <a href="/registro" class="btn btn-outline">
        <i class="fas fa-user-plus"></i> Criar conta gratuita
    </a>
    
    <div class="auth-footer">
        Não tem conta? <a href="/registro">Cadastre-se agora</a>
    </div>
    
    <a href="/planos" class="plans-badge">
        <i class="fas fa-crown"></i> Ver planos premium
    </a>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData);
    
    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await response.json();
        
        if (result.status === 'ok') {
            window.location.href = result.redirect;
        } else {
            const existingError = document.querySelector('.error-message');
            if (existingError) existingError.remove();
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${result.message}`;
            this.insertBefore(errorDiv, this.firstChild);
        }
    } catch (err) {
        this.submit();
    }
});
</script>
{% endblock %}
