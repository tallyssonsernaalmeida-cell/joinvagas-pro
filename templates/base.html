<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoinVagas PRO - {% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #0f1425;
            --bg-tertiary: #151b30;
            --bg-card: #1a2140;
            --border-color: #1e2850;
            --border-light: #263060;
            --text-primary: #e8edf5;
            --text-secondary: #94a3c0;
            --text-muted: #5c6e8f;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-dim: rgba(59, 130, 246, 0.1);
            --accent-glow: rgba(59, 130, 246, 0.2);
            --success: #10b981;
            --success-dim: rgba(16, 185, 129, 0.1);
            --warning: #f59e0b;
            --warning-dim: rgba(245, 158, 11, 0.1);
            --danger: #ef4444;
            --danger-dim: rgba(239, 68, 68, 0.1);
            --info: #06b6d4;
            --info-dim: rgba(6, 182, 212, 0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --gradient-1: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --gradient-2: linear-gradient(135deg, #1e3a5f 0%, #0f2247 100%);
            --gradient-accent: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(ellipse at top left, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(16, 185, 129, 0.03) 0%, transparent 50%);
        }
        
        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: var(--shadow), 0 0 60px rgba(59, 130, 246, 0.05);
            backdrop-filter: blur(10px);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .auth-logo {
            width: 64px;
            height: 64px;
            background: var(--gradient-accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
        }
        
        .auth-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        
        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group .input-wrapper {
            position: relative;
        }
        
        .form-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }
        
        .form-group input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px 14px 12px 42px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
            background: var(--bg-secondary);
        }
        
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }
        
        .btn-primary {
            background: var(--gradient-accent);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            margin-top: 12px;
        }
        
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
        
        .error-message {
            background: var(--danger-dim);
            border: 1px solid var(--danger);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #fca5a5;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .error-message i {
            font-size: 16px;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .auth-footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
        
        .plans-badge {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
        }
        
        .plans-badge:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }
        
        .plans-badge i {
            margin-right: 6px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        
        .divider span {
            margin: 0 16px;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
